    <div id="date">
        <h1 class="animate__animated animate__fadeInUp">Blues Hacks 2024 starts in ...</h1>
        <div class="animate__animated animate__fadeInUp" id="timer">
            <div>..<span>days</span></div>
            <div>..<span>hours</span></div>
            <div>..<span>minutes</span></div>
            <div>..<span>seconds</span></div>
        </div>
    </div>

    <script>
        function updateTimer() {
        future  = Date.parse("2024-01-19T14:00:00Z");
        now     = new Date();
        diff    = future - now;

        days  = Math.floor( diff / (1000*60*60*24) );
        hours = Math.floor( diff / (1000*60*60) );
        mins  = Math.floor( diff / (1000*60) );
        secs  = Math.floor( diff / 1000 );

        d = days;
        h = hours - days  * 24;
        m = mins  - hours * 60;
        s = secs  - mins  * 60;

        document.getElementById("timer").innerHTML =
            '<div>' + d + '<span>days</span></div>' +
            '<div>' + h + '<span>hours</span></div>' +
            '<div>' + m + '<span>minutes</span></div>' +
            '<div>' + s + '<span>seconds</span></div>' ;
        }
        setInterval('updateTimer()', 1000 );

    </script>
